project_id = "sapuvozigtbxowuzwgqq"

[functions.trust-engine]
# O Database Webhook do Supabase autentica a chamada com o service_role key
# (um JWT válido), então mantemos a verificação de JWT padrão ativada.
verify_jwt = true

[functions.send-auth-email]
# Quem chama essa função é o Auth Hook do Supabase, não um usuário logado — não
# existe JWT de usuário para verificar aqui. A autenticidade da chamada é
# garantida pela verificação de assinatura (Standard Webhooks) dentro da função,
# usando o secret gerado ao habilitar o hook no Dashboard.
verify_jwt = false

[functions.dar-lance]
# Chamada pelo cliente autenticado (supabase.functions.invoke já envia o JWT
# do usuário logado).
verify_jwt = true

[functions.cancelar-leilao]
verify_jwt = true

[functions.salvar-cartao]
verify_jwt = true

[functions.processar-inadimplencia]
# Só o pg_cron chama essa função — não há usuário logado. A autenticidade é
# garantida pelo header x-cron-secret checado dentro da função.
verify_jwt = false
